<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBroker LMS</title>
    <!-- Tailwind CSS (ලස්සන UI එකක් ක්ෂණිකව හදාගන්න) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- 1. LOGIN / REGISTER BOX -->
    <div id="auth-container" class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
            
            <!-- Title -->
            <h2 id="auth-title" class="text-2xl font-bold text-center text-gray-800 mb-6">SmartBroker වෙත සාදරයෙන් පිළිගනිමු</h2>
            
            <!-- Auth Form -->
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email ලිපිනය</label>
                    <input type="email" id="auth-email" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password එක</label>
                    <input type="password" id="auth-password" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <button type="submit" id="auth-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                    ඇතුල් වන්න (Login)
                </button>
            </form>
            
            <!-- Toggle Link -->
            <div class="text-center mt-4">
                <button id="toggle-link" onclick="toggleAuthMode()" class="text-sm text-blue-500 hover:underline">
                    ගිණුමක් නැද්ද? මෙතනින් Register වන්න
                </button>
            </div>
        </div>
    </div>

    <!-- 2. STUDENT DASHBOARD (වීඩියෝ බලන පේජ් එක) -->
    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <!-- Navigation Bar -->
        <nav class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">SmartBroker LMS Dashboard</h1>
            <div class="flex items-center gap-4">
                <span id="user-display-email" class="text-sm bg-blue-700 px-3 py-1 rounded"></span>
                <button onclick="logoutUser()" class="bg-red-500 hover:bg-red-600 text-xs font-bold py-1.5 px-3 rounded transition">
                    Logout
                </button>
            </div>
        </nav>

        <!-- Main Content (Video Area) -->
        <div class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-8">
            <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                <!-- Video Player Container -->
                <div class="aspect-video bg-black flex items-center justify-center">
                    <!-- 💡 සටහන: උඹේ වීඩියෝ ලින්ක් එක (YouTube / Vimeo හෝ direct mp4) පහත src එකට දාපන් මචං -->
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="LMS Video" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
                
                <!-- Video Details -->
                <div class="p-6">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">පළමු පාඩම: ඊ-කොමර්ස් සහ ඩිජිටල් මාර්කටින් හැඳින්වීම</h2>
                    <p class="text-gray-600 text-sm leading-relaxed">
                        මෙම වීඩියෝව මගින් ඔයාගේ ඔන්ලයින් බිස්නස් එක සාර්ථකව කරගෙන යන ආකාරය පිළිබඳ මූලික පියවරවල් සරලව සාකච්ඡා කරනු ලබයි. ගැටළු පවතී නම් අපව සම්බන්ධ කරගන්න.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- FIREBASE MODULES AND LOGIC -->
    <script type="module">
        // Firebase සර්විස් Import කරගැනීම
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔗 උඹ එවපු Firebase Config එක
        const firebaseConfig = {
            apiKey: "AIzaSyDVJKSkNv2UQ3ZdCEiZav1XsBAa3xDO10E",
            authDomain: "lms-smartbroker.firebaseapp.com",
            projectId: "lms-smartbroker",
            storageBucket: "lms-smartbroker.firebasestorage.app",
            messagingSenderId: "522489151297",
            appId: "1:522489151297:web:ad2232a65e2c3f1a53ebc0",
            measurementId: "G-S3VH4LYXZQ"
        };

        // Firebase Initialize කිරීම
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // දැනට ඉන්නේ Login Mode එකේද Register Mode එකේද කියා බැලීමට (Default: login)
        let isLoginMode = true;

        // UI මාරු කරන Function එක (Login <-> Register)
        window.toggleAuthMode = function() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById("auth-title");
            const btn = document.getElementById("auth-btn");
            const link = document.getElementById("toggle-link");

            if (isLoginMode) {
                title.innerText = "SmartBroker වෙත සාදරයෙන් පිළිගනිමු";
                btn.innerText = "ඇතුල් වන්න (Login)";
                link.innerText = "ගිණුමක් නැද්ද? මෙතනින් Register වන්න";
            } else {
                title.innerText = "නව ගිණුමක් සාදන්න (Register)";
                btn.innerText = "ලියාපදිංචි වන්න (Register)";
                link.innerText = "දැනටමත් ගිණුමක් තිබේද? Login වන්න";
            }
        }

        // Login සහ Register වැඩ පාලනය කිරීම
        window.handleAuth = function(event) {
            event.preventDefault();
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;

            if (isLoginMode) {
                // Login කිරීම
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("සාර්ථකව Login වුණා මචං! 🔥");
                    })
                    .catch((error) => {
                        alert("වැරදීමක් සිදුවුණා: " + error.message);
                    });
            } else {
                // Register කිරීම
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        alert("ගිණුම සාර්ථකව සෑදුවා! Dashboard එකට ඇතුල් වෙනවා.");
                    })
                    .catch((error) => {
                        alert("Register වීමේදී ගැටළුවක්: " + error.message);
                    });
            }
        }

        // පරිශීලකයා ලොග් වී ඇත්දැයි හැමවිටම නිරීක්ෂණය කිරීම (Auth State Observer)
        onAuthStateChanged(auth, (user) => {
            const authContainer = document.getElementById("auth-container");
            const dashboardContainer = document.getElementById("dashboard-container");
            const userEmailDisplay = document.getElementById("user-display-email");

            if (user) {
                // ළමයා ලොග් වී සිටී නම්: ලොගින් ෆෝම් එක වසා ඩෑෂ්බෝඩ් එක පෙන්වන්න
                authContainer.classList.add("hidden");
                dashboardContainer.classList.remove("hidden");
                userEmailDisplay.innerText = user.email;
            } else {
                // ලොග් වී නැත්නම්: ඩෑෂ්බෝඩ් වසා ලොගින් ෆෝම් එක පෙන්වන්න
                authContainer.classList.remove("hidden");
                dashboardContainer.classList.add("hidden");
            }
        });

        // Logout වීමේ පහසුකම
        window.logoutUser = function() {
            signOut(auth).then(() => {
                alert("සාර්ථකව Logout වුණා!");
            }).catch((error) => {
                alert("Logout වීමේ ගැටළුවක්: " + error.message);
            });
        }
    </script>
</body>
</html>S
