<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBroker LMS PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 for beautiful messages -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }
        .active-lesson { background-color: #27272a !important; border-left: 4px solid #dc2626; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans">

    <!-- 1. AUTH -->
    <div id="auth-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-zinc-900 p-8 rounded-2xl border border-zinc-800">
            <h2 class="text-2xl font-bold text-center mb-6">Student Login</h2>
            <form onsubmit="handleAuth(event)">
                <input type="email" id="auth-email" placeholder="Email" required class="w-full bg-zinc-950 p-3 mb-4 rounded-xl border border-zinc-800">
                <input type="password" id="auth-password" placeholder="Password" required class="w-full bg-zinc-950 p-3 mb-6 rounded-xl border border-zinc-800">
                <button type="submit" class="w-full bg-red-600 py-3 rounded-xl font-bold">Sign In</button>
            </form>
        </div>
    </div>

    <!-- 2. DASHBOARD -->
    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <!-- FIXED HEADER (One Line) -->
        <nav class="bg-black border-b border-zinc-800 px-4 py-3 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <span class="bg-red-600 text-white px-2 py-1 rounded font-black text-xs">SB</span>
                <h1 class="text-sm font-bold truncate">SmartBroker</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <a href="https://wa.me/94776104665" target="_blank" class="bg-red-600 px-3 py-1.5 rounded-lg text-[11px] font-bold">Support</a>
                <button onclick="toggleProfileModal()" class="text-zinc-400 text-xs hover:text-white"><i class="fa-solid fa-user"></i></button>
                <button onclick="logoutUser()" class="text-red-500 text-xs font-bold">Out</button>
            </div>
        </nav>

        <div class="flex flex-1 flex-col lg:flex-row">
            <aside id="lessons-list" class="lg:w-80 border-b lg:border-r border-zinc-800 p-4 space-y-2 max-h-[300px] lg:max-h-screen overflow-y-auto"></aside>
            
            <main class="flex-1 p-4 md:p-6">
                <div id="video-wrapper" class="aspect-video bg-zinc-900 rounded-xl overflow-hidden mb-4">
                    <iframe id="video-player" class="w-full h-full" src=""></iframe>
                </div>
                <div id="quiz-wrapper" class="hidden bg-zinc-900 p-6 rounded-xl border border-red-900/50"></div>
                <button id="cert-btn" onclick="claimCertificateViaWhatsApp()" class="hidden w-full bg-amber-600 py-3 rounded-xl font-bold mt-4 shadow-lg">Claim Certificate via WhatsApp</button>
            </main>
        </div>
    </div>

    <!-- PROFILE MODAL (Address added) -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-900 w-full max-w-md p-6 rounded-2xl border border-zinc-800">
            <h3 class="font-bold mb-4">Update Profile</h3>
            <input type="text" id="profile-name" placeholder="Full Name" class="w-full bg-zinc-950 p-3 mb-3 rounded-xl border border-zinc-800 text-sm">
            <textarea id="profile-address" placeholder="Residential Address" class="w-full bg-zinc-950 p-3 mb-3 rounded-xl border border-zinc-800 text-sm"></textarea>
            <button onclick="saveProfile()" class="w-full bg-red-600 py-3 rounded-xl text-sm font-bold">Save Details</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Firebase config (Add your own)
        const app = initializeApp({/*...*/});
        const auth = getAuth(app);

        // Success Message Style
        window.showSuccess = (msg) => {
            Swal.fire({
                title: 'Success!',
                text: msg,
                icon: 'success',
                background: '#18181b',
                color: '#fff',
                confirmButtonColor: '#dc2626'
            });
        };

        // WhatsApp Certificate Logic
        window.claimCertificateViaWhatsApp = function() {
            const name = document.getElementById('profile-name').value || "Student";
            const msg = `Hi, I have completed the course! My name is ${name}. Please issue my certificate.`;
            window.open(`https://wa.me/94776104665?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.toggleProfileModal = () => document.getElementById('profile-modal').classList.toggle('hidden');
        window.logoutUser = () => signOut(auth);
        
        // Placeholder for Auth/Lesson rendering (Insert existing Firebase logic here)
    </script>
</body>
</html>
