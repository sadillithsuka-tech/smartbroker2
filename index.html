<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBroker LMS Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .active-lesson { background-color: #dc2626 !important; color: white !important; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans">

    <div id="auth-container" class="min-h-screen flex items-center justify-center bg-zinc-950">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-800 text-center w-80">
            <h2 class="text-2xl font-bold mb-6 text-white">Student Login</h2>
            <form onsubmit="handleAuth(event)">
                <input type="email" id="auth-email" placeholder="Email" class="w-full bg-black p-3 mb-4 rounded-xl border border-zinc-700">
                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-black p-3 mb-6 rounded-xl border border-zinc-700">
                <button type="submit" class="w-full bg-red-600 py-3 rounded-xl font-bold">Login</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden min-h-screen flex flex-col">
        <nav class="bg-black border-b border-zinc-800 p-4 flex justify-between items-center">
            <h1 class="font-bold text-lg">SmartBroker <span class="text-red-500">LMS</span></h1>
            <div class="flex items-center gap-3">
                <a href="https://wa.me/94776104665" class="text-xs bg-zinc-800 px-3 py-2 rounded-lg"><i class="fa-brands fa-whatsapp mr-1"></i>Support Team</a>
                <button onclick="toggleProfileModal()" class="text-xs bg-zinc-800 px-3 py-2 rounded-lg"><i class="fa-solid fa-user mr-1"></i>Profile</button>
                <button onclick="logoutUser()" class="text-xs bg-red-900/50 text-red-500 px-3 py-2 rounded-lg"><i class="fa-solid fa-right-from-bracket mr-1"></i>Logout</button>
            </div>
        </nav>

        <div class="flex-1 flex flex-col lg:flex-row">
            <aside class="w-full lg:w-80 bg-zinc-950 p-4 border-r border-zinc-800 overflow-y-auto">
                <div id="lessons-list" class="space-y-4"></div>
            </aside>
            <main class="flex-1 p-6">
                <div id="video-wrapper" class="aspect-video bg-zinc-900 rounded-xl mb-6"><iframe id="video-player" class="w-full h-full" src=""></iframe></div>
                <div id="quiz-box" class="hidden bg-zinc-900 p-6 rounded-xl border border-zinc-800"></div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Firebase Config (ඔබේ විස්තර මෙතනට දාන්න)
        const firebaseConfig = { /* ... */ };
        initializeApp(firebaseConfig);
        const auth = getAuth();

        // සිංහල පාඩම් 15 සහ මොඩියුල 5
        const courseData = [
            { m: "Module 1", title: "වාහන බ්‍රෝකර් හැඳින්වීම", quiz: [{q:"බ්‍රෝකර් යනු කවුද?", a:['මැදිහත්කරු', 'ගැණුම්කරු', 'විකුණුම්කරු'], c:0}, {q:"ලංකාවේ වාහන වෙළඳපොළ", a:['කුඩා', 'විශාල', 'සීමිත'], c:1}, {q:"ආදායම", a:['කොමිස්', 'පඩිය', 'ණය'], c:0}] },
            // මෙලෙස පාඩම් 15 දක්වා ලියන්න...
        ];

        let currentLesson = 0;

        window.selectLesson = (idx) => {
            currentLesson = idx;
            document.getElementById('video-player').src = "https://www.youtube.com/embed/dQw4w9WgXcQ";
            renderQuiz();
        };

        window.renderQuiz = () => {
            const quiz = courseData[currentLesson].quiz;
            let html = `<h3 class="font-bold mb-4">Quiz: ${courseData[currentLesson].title}</h3>`;
            quiz.forEach((q, i) => {
                html += `<div class="mb-4"><div>${i+1}. ${q.q}</div>${q.a.map((a, j) => `<button onclick="checkAnswer(${i}, ${j})" class="block bg-zinc-800 w-full p-2 mt-2 rounded">${a}</button>`).join('')}</div>`;
            });
            const box = document.getElementById('quiz-box');
            box.innerHTML = html;
            box.classList.remove('hidden');
        };

        window.checkAnswer = (qIdx, aIdx) => {
            if(courseData[currentLesson].quiz[qIdx].c === aIdx) {
                Swal.fire('හරි!', 'ඊළඟට යන්න.', 'success').then(() => {
                    if(currentLesson < 14) selectLesson(currentLesson + 1);
                    else triggerMillionClub();
                });
            } else {
                Swal.fire('වැරදියි!', 'නැවත උත්සාහ කරන්න.', 'error');
            }
        };

        function triggerMillionClub() {
            Swal.fire({
                title: '🚀 Million Club සාදරයෙන් පිළිගනිමු!',
                text: "ඔබ සාර්ථකව පාඨමාලාව අවසන් කළා! ඔබේ පළමු මිලියනය උපයන්න අදම පටන් ගනිමු.",
                icon: 'success'
            });
        }

        window.handleAuth = (e) => { e.preventDefault(); /* login logic */ };
        window.logoutUser = () => signOut(auth);
        window.toggleProfileModal = () => document.getElementById('profile-modal').classList.toggle('hidden');

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
